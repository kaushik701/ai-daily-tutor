name: Daily AI Lesson

on:
  schedule:
    # 11:00 AM Pacific = 18:00 UTC (PST) / 19:00 UTC (PDT)
    # We run twice and let the in-app idempotency guard prevent double-sends.
    # This way the lesson lands at 11 AM PT year-round, regardless of DST.
    - cron: "0 18 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate but do not send"
        required: false
        default: "false"
      force_quiz:
        description: "Force a quiz even on a non-Sunday"
        required: false
        default: "false"

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # so we can commit the archived email + state.db
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tutor
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          if [ "${{ github.event.inputs.force_quiz }}" = "true" ]; then FLAGS="$FLAGS --force-quiz"; fi
          python -m src.main $FLAGS

      - name: Commit archive + state
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "ai-daily-tutor[bot]"
          git config user.email "ai-daily-tutor@users.noreply.github.com"
          git add data/ examples/sent/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: archive $(date -u +%Y-%m-%d) email + state update"
            git push
          fi

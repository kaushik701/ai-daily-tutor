# 90-Day AI Engineering Curriculum
# Days 1-30: ML/DL Fundamentals
# Days 31-60: LLM-Specific Concepts
# Days 61-90: AI Engineering & Production Stack
#
# Each entry: day number, topic, short hint to focus the explanation,
# difficulty tag, and a "why-it-matters" angle for AI Eng interviews.

phase_1_fundamentals:
  - day: 1
    topic: "What is a Model?"
    focus: "Function approximation, parameters vs hyperparameters"
    difficulty: beginner
    interview_angle: "Foundation for all ML discussions"

  - day: 2
    topic: "Supervised vs Unsupervised vs Reinforcement Learning"
    focus: "When to use each, with one concrete example per type"
    difficulty: beginner
    interview_angle: "Common framing question"

  - day: 3
    topic: "Training, Validation, and Test Sets"
    focus: "Why three splits exist, data leakage"
    difficulty: beginner
    interview_angle: "Asked in every ML interview"

  - day: 4
    topic: "Bias vs Variance Tradeoff"
    focus: "Underfitting vs overfitting with a learning curve example"
    difficulty: beginner
    interview_angle: "Diagnosing model failures"

  - day: 5
    topic: "Loss Functions"
    focus: "MSE for regression, cross-entropy for classification, intuition not derivation"
    difficulty: beginner
    interview_angle: "Why choose one over another"

  - day: 6
    topic: "Gradient Descent"
    focus: "The hill-climbing analogy, learning rate, one update step"
    difficulty: beginner
    interview_angle: "Foundation of all neural network training"

  - day: 7
    topic: "Stochastic vs Batch vs Mini-batch Gradient Descent"
    focus: "Tradeoffs in noise, speed, memory"
    difficulty: beginner
    interview_angle: "Practical training decisions"

  - day: 8
    topic: "Linear Regression"
    focus: "The simplest model, what its weights mean"
    difficulty: beginner
    interview_angle: "Baseline for any tabular problem"

  - day: 9
    topic: "Logistic Regression"
    focus: "Sigmoid, classification probabilities"
    difficulty: beginner
    interview_angle: "Often the right answer when DL is overkill"

  - day: 10
    topic: "Decision Trees and Random Forests"
    focus: "Splits, ensembling, feature importance"
    difficulty: beginner
    interview_angle: "Strong tabular baseline, often beats DL"

  - day: 11
    topic: "Neural Networks: Perceptron and MLP"
    focus: "Layers, weights, biases, forward pass"
    difficulty: beginner
    interview_angle: "Building block of everything"

  - day: 12
    topic: "Activation Functions"
    focus: "ReLU, GELU, sigmoid, tanh — why nonlinearity matters"
    difficulty: beginner
    interview_angle: "Asked surprisingly often"

  - day: 13
    topic: "Backpropagation"
    focus: "Chain rule applied to networks, intuition not full math"
    difficulty: intermediate
    interview_angle: "How models actually learn"

  - day: 14
    topic: "Optimizers: SGD, Momentum, Adam"
    focus: "Why Adam is the default, when SGD wins"
    difficulty: intermediate
    interview_angle: "Practical training knob"

  - day: 15
    topic: "Regularization: L1, L2, Dropout"
    focus: "Fighting overfitting, intuition for each"
    difficulty: intermediate
    interview_angle: "Standard interview question"

  - day: 16
    topic: "Batch Normalization and Layer Normalization"
    focus: "Why training got stable, where each is used"
    difficulty: intermediate
    interview_angle: "Transformer prerequisite"

  - day: 17
    topic: "Convolutional Neural Networks (CNNs)"
    focus: "Convolutions, pooling, why they work for images"
    difficulty: intermediate
    interview_angle: "Still relevant for vision and signals"

  - day: 18
    topic: "Recurrent Neural Networks (RNNs) and LSTMs"
    focus: "Sequence modeling before transformers, vanishing gradients"
    difficulty: intermediate
    interview_angle: "Historical context, attention motivation"

  - day: 19
    topic: "Word Embeddings: Word2Vec and GloVe"
    focus: "From one-hot to dense vectors, king - man + woman = queen"
    difficulty: intermediate
    interview_angle: "Foundation of modern NLP"

  - day: 20
    topic: "Attention Mechanism"
    focus: "Query, Key, Value — the core idea, with a tiny worked example"
    difficulty: intermediate
    interview_angle: "Most important concept in modern AI"

  - day: 21
    topic: "Transformers"
    focus: "Self-attention, multi-head, why they replaced RNNs"
    difficulty: intermediate
    interview_angle: "Asked in every AI Eng interview"

  - day: 22
    topic: "Positional Encoding"
    focus: "How transformers know word order, sinusoidal vs learned"
    difficulty: intermediate
    interview_angle: "Common follow-up to transformers"

  - day: 23
    topic: "Encoder-only vs Decoder-only vs Encoder-Decoder"
    focus: "BERT vs GPT vs T5, when to use each"
    difficulty: intermediate
    interview_angle: "Choosing the right architecture"

  - day: 24
    topic: "Tokenization"
    focus: "BPE, WordPiece, SentencePiece, tokens vs words"
    difficulty: intermediate
    interview_angle: "Affects cost, latency, multilingual"

  - day: 25
    topic: "Pretraining vs Fine-tuning"
    focus: "Two-stage paradigm, why pretraining transfers"
    difficulty: intermediate
    interview_angle: "Foundation for all LLM work"

  - day: 26
    topic: "Transfer Learning"
    focus: "Reusing pretrained features, when it fails"
    difficulty: intermediate
    interview_angle: "Practical deployment pattern"

  - day: 27
    topic: "Evaluation Metrics: Accuracy, Precision, Recall, F1"
    focus: "When each lies, confusion matrix"
    difficulty: intermediate
    interview_angle: "Classic interview question"

  - day: 28
    topic: "ROC, AUC, and Precision-Recall Curves"
    focus: "Threshold-independent evaluation, when AUC misleads"
    difficulty: intermediate
    interview_angle: "Common in classification roles"

  - day: 29
    topic: "Cross-Validation"
    focus: "K-fold, stratified, time-series splits"
    difficulty: intermediate
    interview_angle: "Robust evaluation"

  - day: 30
    topic: "Hyperparameter Tuning"
    focus: "Grid, random, Bayesian search; when to stop"
    difficulty: intermediate
    interview_angle: "Practical model improvement"

